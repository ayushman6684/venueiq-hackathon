.logo-name{font-size:17px;font-weight:700;letter-spacing:1px;line-height:1;display:block}

// ── CHARTS ────────────────────────────────────────────────────
function spark(canvas,data,color){
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr||400;
  canvas.height=canvas.offsetHeight*dpr||80;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>({x:(i/(data.length-1))*W,y:H-((v-mn)/rng)*(H-4)-2}));
  ctx.beginPath();ctx.moveTo(pts[0].x,H);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,color+'40');g.addColorStop(1,color+'00');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();
}
function heatColor(v){return v>.85?`rgba(255,77,109,${.6+v*.3})`:v>.6?`rgba(255,140,70,${.5+v*.3})`:v>.35?`rgba(255,209,102,${.3+v*.4})`:`rgba(0,229,160,${.15+v*.5})`;}

function go(el, pageId) {
  ['_di','_qi'].forEach(k=>{ if(window[k]){clearInterval(window[k]);window[k]=null;} });
  document.querySelectorAll('.nav-item').forEach(n=>{n.classList.remove('active');n.removeAttribute('aria-current');});
  if(el){el.classList.add('active');el.setAttribute('aria-current','page');}
  const main=document.getElementById('main-content');
  if(!PAGES[pageId]) return;
  main.innerHTML=PAGES[pageId]();
  if(typeof trackEvent!=='undefined') trackEvent('Navigation','page_view',pageId);
  requestAnimationFrame(()=>initPage(pageId));
}

function initPage(id){
  if(id==='dashboard'){
    // heatmap
    const hm=document.getElementById('hmap');
    if(hm) hm.innerHTML=DATA.heatmap.map(v=>`<div style="background:${heatColor(v)};border-radius:2px;transition:all .5s"></div>`).join('');
    // charts
    setTimeout(()=>{
      spark(document.getElementById('c-flow'),DATA.flowHistory,'#4ea8ff');
      spark(document.getElementById('c-occ'),DATA.hourlyOcc,'#00e5a0');
    },50);
    // live update
    window._di=setInterval(()=>{
      const w=document.getElementById('v-wait');
      if(w) w.innerHTML=DATA.metrics.avgWait.value.toFixed(1)+'<span style="font-size:14px;opacity:.5"> min</span>';
    },4000);
  }
  if(id==='analytics'){
    setTimeout(()=>spark(document.getElementById('c-ana'),DATA.hourlyOcc,'#00e5a0'),50);
  }
  if(id==='map'){
    // Try Google Maps JS API first, fallback to iframe
    setTimeout(()=>{
      const mc=document.getElementById('google-map-container');
      const mf=document.getElementById('map-fallback');
      if(typeof google!=='undefined'&&google.maps&&mc){
        const map=new google.maps.Map(mc,{center:{lat:18.9388,lng:72.8258},zoom:16,mapTypeId:'satellite'});
        new google.maps.Marker({position:{lat:18.9388,lng:72.8258},map,title:'Wankhede Stadium'});
      } else if(mc&&mf){
        
        
      }
    },500);
  }
}

function sendFan(){
  const inp=document.getElementById('fi');
  const chat=document.getElementById('fan-chat');
  if(!inp||!chat||!inp.value.trim()) return;
  const msg=document.createElement('div');
  msg.style.cssText='background:var(--accent);color:#000;border-radius:9px 3px 9px 9px;padding:7px 10px;font-size:11.5px;margin-bottom:7px;font-weight:500;text-align:right';
  msg.textContent=inp.value;
  chat.appendChild(msg);
  if(typeof trackEvent!=='undefined') trackEvent('FanChat','message_sent',inp.value.substring(0,30));
  inp.value='';
  setTimeout(()=>{
    const rep=document.createElement('div');
    rep.style.cssText='background:var(--bg3);border:1px solid var(--border);border-radius:3px 9px 9px 9px;padding:7px 10px;font-size:11.5px;line-height:1.4;margin-bottom:7px';
    rep.innerHTML='Based on current data: <strong>Food Court 2</strong> (3.1 min wait) is best. Want directions from your seat?';
    chat.appendChild(rep);
    chat.scrollTop=chat.scrollHeight;
  },800);
}

// Google Maps callback
function initGoogleMap(){
  if(document.getElementById('google-map-container')&&typeof google!=='undefined'){
    const map=new google.maps.Map(document.getElementById('google-map-container'),{center:{lat:18.9388,lng:72.8258},zoom:16,mapTypeId:'satellite'});
    new google.maps.Marker({position:{lat:18.9388,lng:72.8258},map,title:'Wankhede Stadium'});
  }
}

// ── BOOT ──────────────────────────────────────────────────────
go(document.querySelector('[data-page="dashboard"]'),'dashboard');
</script>
